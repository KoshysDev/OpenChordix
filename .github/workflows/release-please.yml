name: release-please

on:
  workflow_run:
    workflows: ["ci"]
    branches: [master]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  linux-build-appimage:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    env:
      VCPKG_FEATURE_FLAGS: manifests
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg/binary_cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check system dependencies
        id: sysdeps
        run: |
          missing=0
          for pkg in build-essential cmake git pkg-config nasm yasm libasound2-dev libgl1-mesa-dev xorg-dev fuse; do
            if ! dpkg -s "$pkg" >/dev/null 2>&1; then
              missing=1
              break
            fi
          done
          echo "missing=$missing" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        if: steps.sysdeps.outputs.missing == '1'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git pkg-config \
            nasm yasm \
            libasound2-dev \
            libgl1-mesa-dev xorg-dev \
            fuse

      - name: Capture bgfx revisions
        id: bgfx-revs
        run: |
          echo "bgfx=$(git -C external/bgfx rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "bx=$(git -C external/bx rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "bimg=$(git -C external/bimg rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache bgfx build
        id: bgfx-cache
        uses: actions/cache@v4
        with:
          path: external/bgfx/.build
          key: ${{ runner.os }}-bgfx-${{ steps.bgfx-revs.outputs.bgfx }}-${{ steps.bgfx-revs.outputs.bx }}-${{ steps.bgfx-revs.outputs.bimg }}

      - name: Build bgfx (Release)
        if: steps.bgfx-cache.outputs.cache-hit != 'true'
        run: make -C external/bgfx linux-gcc-release64 -j2

      - name: Cache vcpkg artifacts
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/vcpkg/binary_cache
            vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}

      - name: Ensure vcpkg cache directory
        run: mkdir -p .cache/vcpkg/binary_cache

      - name: Check vcpkg tool
        id: vcpkg-tool
        run: |
          if [ -x external/vcpkg/vcpkg ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check vcpkg install
        id: vcpkg-installed
        run: |
          if [ -d vcpkg_installed ] && [ -n "$(ls -A vcpkg_installed 2>/dev/null)" ]; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bootstrap vcpkg
        if: steps.vcpkg-tool.outputs.ready != 'true'
        run: ./external/vcpkg/bootstrap-vcpkg.sh

      - name: Install vcpkg dependencies
        if: steps.vcpkg-installed.outputs.installed != 'true'
        run: ./external/vcpkg/vcpkg install

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=./external/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build -j2

      - name: Package AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/src/app/OpenChordix AppDir/usr/bin/OpenChordix
          cp assets/icons/AppIcon.png AppDir/usr/share/icons/hicolor/256x256/apps/openchordix.png
          cat > AppDir/usr/share/applications/openchordix.desktop <<'EOF'
          [Desktop Entry]
          Name=OpenChordix
          Comment=OpenChordix Pitch Detection
          Exec=OpenChordix
          Icon=openchordix
          Terminal=false
          Type=Application
          Categories=AudioVideo;Audio;
          EOF
          curl -L -o linuxdeploy.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy.AppImage
          APPIMAGE_NAME=OpenChordix ./linuxdeploy.AppImage --appdir AppDir --output appimage

      - name: Upload AppImage
        uses: softprops/action-gh-release@v2
        with:
          files: OpenChordix*.AppImage
          tag_name: ${{ needs.release-please.outputs.tag_name }}

  windows-build-zip:
    runs-on: windows-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    env:
      VCPKG_FEATURE_FLAGS: manifests
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg/binary_cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Capture bgfx revisions
        id: bgfx-revs-win
        shell: pwsh
        run: |
          "bgfx=$(git -C external/bgfx rev-parse HEAD)" >> $env:GITHUB_OUTPUT
          "bx=$(git -C external/bx rev-parse HEAD)" >> $env:GITHUB_OUTPUT
          "bimg=$(git -C external/bimg rev-parse HEAD)" >> $env:GITHUB_OUTPUT

      - name: Cache bgfx build (Windows)
        id: bgfx-cache-win
        uses: actions/cache@v4
        with:
          path: external/bgfx/.build
          key: ${{ runner.os }}-bgfx-${{ steps.bgfx-revs-win.outputs.bgfx }}-${{ steps.bgfx-revs-win.outputs.bx }}-${{ steps.bgfx-revs-win.outputs.bimg }}

      - name: Cache vcpkg artifacts (Windows)
        id: vcpkg-cache-win
        uses: actions/cache@v4
        with:
          path: |
            .cache/vcpkg/binary_cache
            build/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}

      - name: Ensure vcpkg cache directory
        shell: pwsh
        run: New-Item -Path .cache/vcpkg/binary_cache -ItemType Directory -Force | Out-Null

      - name: Setup MSYS2 (MinGW)
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-make

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build (MinGW)
        shell: pwsh
        run: .\windows-build-setup.bat

      - name: Package Windows zip
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "dist\windows-x64"
          New-Item -Path $artifactDir -ItemType Directory -Force | Out-Null

          $exePath = Join-Path $env:GITHUB_WORKSPACE "build\src\app\OpenChordix.exe"
          if (!(Test-Path $exePath)) {
            throw "OpenChordix.exe not found at $exePath"
          }
          Copy-Item $exePath -Destination $artifactDir -Force

          $vcpkgBin = Join-Path $env:GITHUB_WORKSPACE "build\vcpkg_installed\x64-mingw-dynamic\bin"
          $mingwBin = "C:\msys64\mingw64\bin"

          $requiredDlls = @(
            "glfw3.dll",
            "libfastgltf.dll",
            "librtaudio.dll",
            "libsimdjson.dll"
          )
          $optionalDlls = @(
            "libgcc_s_seh-1.dll",
            "libstdc++-6.dll",
            "libwinpthread-1.dll"
          )

          function Copy-Dll([string]$dll, [bool]$required) {
            $fromVcpkg = Join-Path $vcpkgBin $dll
            $fromMingw = Join-Path $mingwBin $dll
            if (Test-Path $fromVcpkg) {
              Copy-Item $fromVcpkg -Destination $artifactDir -Force
              return
            }
            if (Test-Path $fromMingw) {
              Copy-Item $fromMingw -Destination $artifactDir -Force
              return
            }
            if ($required) {
              throw "Required runtime DLL not found: $dll"
            }
            Write-Host "Optional DLL not found (skipped): $dll"
          }

          foreach ($dll in $requiredDlls) {
            Copy-Dll $dll $true
          }
          foreach ($dll in $optionalDlls) {
            Copy-Dll $dll $false
          }

          $zipPath = Join-Path $env:GITHUB_WORKSPACE "OpenChordix-windows-x64.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $artifactDir "*") -DestinationPath $zipPath

      - name: Upload Windows zip
        uses: softprops/action-gh-release@v2
        with:
          files: OpenChordix-windows-x64.zip
          tag_name: ${{ needs.release-please.outputs.tag_name }}
