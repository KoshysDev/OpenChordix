name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  linux-build-test:
    runs-on: ubuntu-latest
    env:
      VCPKG_FEATURE_FLAGS: manifests
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg/binary_cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check system dependencies
        id: sysdeps
        run: |
          missing=0
          for pkg in build-essential cmake git pkg-config nasm yasm libasound2-dev libgl1-mesa-dev xorg-dev; do
            if ! dpkg -s "$pkg" >/dev/null 2>&1; then
              missing=1
              break
            fi
          done
          echo "missing=$missing" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        if: steps.sysdeps.outputs.missing == '1'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git pkg-config \
            nasm yasm \
            libasound2-dev \
            libgl1-mesa-dev xorg-dev

      - name: Capture bgfx revisions
        id: bgfx-revs
        run: |
          echo "bgfx=$(git -C external/bgfx rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "bx=$(git -C external/bx rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "bimg=$(git -C external/bimg rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore bgfx build cache
        id: bgfx-cache
        uses: actions/cache/restore@v4
        with:
          path: external/bgfx/.build
          key: ${{ runner.os }}-bgfx-${{ steps.bgfx-revs.outputs.bgfx }}-${{ steps.bgfx-revs.outputs.bx }}-${{ steps.bgfx-revs.outputs.bimg }}

      - name: Build bgfx (Release)
        if: steps.bgfx-cache.outputs.cache-hit != 'true'
        run: make -C external/bgfx linux-gcc-release64 -j2

      - name: Save bgfx build cache
        if: steps.bgfx-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: external/bgfx/.build
          key: ${{ steps.bgfx-cache.outputs.cache-primary-key }}

      - name: Restore vcpkg artifacts cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .cache/vcpkg/binary_cache
            vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}

      - name: Ensure vcpkg cache directory
        run: mkdir -p .cache/vcpkg/binary_cache

      - name: Check vcpkg tool
        id: vcpkg-tool
        run: |
          if [ -x external/vcpkg/vcpkg ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check vcpkg install
        id: vcpkg-installed
        run: |
          if [ -d vcpkg_installed ] && [ -n "$(ls -A vcpkg_installed 2>/dev/null)" ]; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bootstrap vcpkg
        if: steps.vcpkg-tool.outputs.ready != 'true'
        run: ./external/vcpkg/bootstrap-vcpkg.sh

      - name: Install vcpkg dependencies
        if: steps.vcpkg-cache.outputs.cache-hit != 'true' || steps.vcpkg-installed.outputs.installed != 'true'
        run: ./external/vcpkg/vcpkg install

      - name: Save vcpkg artifacts cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .cache/vcpkg/binary_cache
            vcpkg_installed
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Configure (Release)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DOPENCHORDIX_BUILD_TESTS=ON \
            -DOPENCHORDIX_BUILD_APP=ON \
            -DOPENCHORDIX_BUILD_RENDERER=ON \
            -DCMAKE_TOOLCHAIN_FILE=./external/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build (Release)
        run: cmake --build build -j2

      - name: Test (Release)
        run: ctest --test-dir build --output-on-failure

      - name: Configure (ASan/UBSan)
        run: |
          cmake -B build-sanitize -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DOPENCHORDIX_BUILD_TESTS=ON \
            -DOPENCHORDIX_BUILD_APP=OFF \
            -DOPENCHORDIX_BUILD_RENDERER=OFF \
            -DCMAKE_TOOLCHAIN_FILE=./external/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build (ASan/UBSan)
        run: cmake --build build-sanitize -j2

      - name: Test (ASan/UBSan)
        env:
          ASAN_OPTIONS: detect_leaks=1
        run: ctest --test-dir build-sanitize --output-on-failure

  windows-build-test:
    runs-on: windows-latest
    env:
      VCPKG_FEATURE_FLAGS: manifests
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg/binary_cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.cache/vcpkg/binary_cache,readwrite
      VCPKG_DEFAULT_TRIPLET: x64-mingw-dynamic
      VCPKG_DEFAULT_HOST_TRIPLET: x64-mingw-dynamic
      VCPKG_MAX_CONCURRENCY: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Capture bgfx revisions
        id: bgfx-revs-win
        shell: pwsh
        run: |
          "bgfx=$(git -C external/bgfx rev-parse HEAD)" >> $env:GITHUB_OUTPUT
          "bx=$(git -C external/bx rev-parse HEAD)" >> $env:GITHUB_OUTPUT
          "bimg=$(git -C external/bimg rev-parse HEAD)" >> $env:GITHUB_OUTPUT

      - name: Capture vcpkg revision
        id: vcpkg-rev-win
        shell: pwsh
        run: |
          "vcpkg=$(git -C external/vcpkg rev-parse HEAD)" >> $env:GITHUB_OUTPUT

      - name: Restore bgfx build cache (Windows)
        id: bgfx-cache-win
        uses: actions/cache/restore@v4
        with:
          path: external/bgfx/.build
          key: ${{ runner.os }}-bgfx-${{ steps.bgfx-revs-win.outputs.bgfx }}-${{ steps.bgfx-revs-win.outputs.bx }}-${{ steps.bgfx-revs-win.outputs.bimg }}

      - name: Restore vcpkg artifacts cache (Windows)
        id: vcpkg-cache-win
        uses: actions/cache/restore@v4
        with:
          path: |
            .cache/vcpkg/binary_cache
            build/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ env.VCPKG_DEFAULT_TRIPLET }}-${{ steps.vcpkg-rev-win.outputs.vcpkg }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ env.VCPKG_DEFAULT_TRIPLET }}-${{ steps.vcpkg-rev-win.outputs.vcpkg }}-
            ${{ runner.os }}-vcpkg-${{ env.VCPKG_DEFAULT_TRIPLET }}-

      - name: Ensure vcpkg cache directory
        shell: pwsh
        run: New-Item -Path .cache/vcpkg/binary_cache -ItemType Directory -Force | Out-Null

      - name: Setup MSYS2 (MinGW)
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-make
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-yasm

      - name: Resolve MinGW path
        id: mingw-path
        shell: pwsh
        run: |
          $candidates = @(
            "C:\msys64\mingw64\bin",
            (Join-Path $env:RUNNER_TEMP "msys64\mingw64\bin"),
            "D:\a\_temp\msys64\mingw64\bin"
          )
          $binDir = $null
          foreach ($candidate in $candidates) {
            if (Test-Path (Join-Path $candidate "g++.exe")) {
              $binDir = $candidate
              break
            }
          }

          if (-not $binDir) {
            throw "Failed to locate MinGW bin directory from known MSYS2 locations."
          }

          $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "mingw_bin=$binDir" >> $env:GITHUB_OUTPUT

      - name: Patch bgfx file_list for MinGW dirent
        shell: pwsh
        run: |
          $file = "external/bgfx/3rdparty/dear-imgui/widgets/file_list.inl"
          $content = Get-Content $file -Raw
          $old = '#if defined(_DIRENT_HAVE_D_TYPE) && defined(DT_DIR)'
          $new = '#if defined(_DIRENT_HAVE_D_TYPE) && defined(DT_DIR) && !defined(__MINGW32__)'
          if ($content.Contains($new)) {
            Write-Host "bgfx file_list MinGW patch already applied."
          } elseif ($content.Contains($old)) {
            $content = $content.Replace($old, $new)
            Set-Content -Path $file -Value $content -NoNewline
            Write-Host "Applied MinGW dirent compatibility patch to $file"
          } else {
            Write-Host "Expected pattern not found in $file; patch may already be upstream."
          }

      - name: Build bgfx (Windows Release)
        if: steps.bgfx-cache-win.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          export MINGW=/mingw64
          mingw32-make -C external/bgfx mingw-gcc-release64 MINGW="$MINGW" -j2

      - name: Save bgfx build cache (Windows)
        if: steps.bgfx-cache-win.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: external/bgfx/.build
          key: ${{ steps.bgfx-cache-win.outputs.cache-primary-key }}

      - name: Check vcpkg tool
        id: vcpkg-tool-win
        shell: pwsh
        run: |
          if (Test-Path "external/vcpkg/vcpkg.exe") {
            "ready=true" >> $env:GITHUB_OUTPUT
          } else {
            "ready=false" >> $env:GITHUB_OUTPUT
          }

      - name: Check vcpkg install
        id: vcpkg-installed-win
        shell: pwsh
        run: |
          $buildInstalled = Test-Path "build/vcpkg_installed" -PathType Container
          $buildCount = if ($buildInstalled) { (Get-ChildItem "build/vcpkg_installed" -Force | Measure-Object).Count } else { 0 }
          if ($buildCount -gt 0) {
            "installed=true" >> $env:GITHUB_OUTPUT
          } else {
            "installed=false" >> $env:GITHUB_OUTPUT
          }

      - name: Bootstrap vcpkg
        if: steps.vcpkg-tool-win.outputs.ready != 'true'
        shell: pwsh
        run: .\external\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Patch vcpkg ffmpeg make launcher
        shell: pwsh
        run: |
          $ffmpegBuildScript = "external/vcpkg/ports/ffmpeg/build.sh.in"
          $content = Get-Content $ffmpegBuildScript -Raw
          $patched = $content -replace 'MAKE_BINARY="make"', 'MAKE_BINARY="/usr/bin/make"'
          if ($patched -eq $content) {
            Write-Host "ffmpeg build.sh.in already patched or format changed."
          } else {
            Set-Content -Path $ffmpegBuildScript -Value $patched
          }

      - name: Install vcpkg dependencies
        if: steps.vcpkg-cache-win.outputs.cache-hit != 'true' || steps.vcpkg-installed-win.outputs.installed != 'true'
        shell: pwsh
        run: |
          $buildtreesRoot = Join-Path $env:RUNNER_TEMP "vcpkg-buildtrees"
          $packagesRoot = Join-Path $env:RUNNER_TEMP "vcpkg-packages"
          $downloadsRoot = Join-Path $env:RUNNER_TEMP "vcpkg-downloads"
          $tempRoots = @($buildtreesRoot, $packagesRoot, $downloadsRoot)
          foreach ($root in $tempRoots) {
            if (Test-Path $root) {
              Remove-Item $root -Recurse -Force
            }
            New-Item -Path $root -ItemType Directory -Force | Out-Null
          }

          $installArgs = @(
            "install",
            "--triplet", "x64-mingw-dynamic",
            "--host-triplet", "x64-mingw-dynamic",
            "--x-install-root=build/vcpkg_installed",
            "--x-buildtrees-root=$buildtreesRoot",
            "--x-packages-root=$packagesRoot",
            "--x-downloads-root=$downloadsRoot"
          )

          & .\external\vcpkg\vcpkg.exe @installArgs
          if ($LASTEXITCODE -eq 0) {
            exit 0
          }

          Write-Host "First vcpkg install attempt failed. Retrying from clean temporary roots..."
          foreach ($root in $tempRoots) {
            if (Test-Path $root) {
              Remove-Item $root -Recurse -Force
            }
            New-Item -Path $root -ItemType Directory -Force | Out-Null
          }

          & .\external\vcpkg\vcpkg.exe @installArgs
          exit $LASTEXITCODE

      - name: Save vcpkg artifacts cache (Windows)
        if: steps.vcpkg-cache-win.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .cache/vcpkg/binary_cache
            build/vcpkg_installed
          key: ${{ steps.vcpkg-cache-win.outputs.cache-primary-key }}

      - name: Configure (Windows Release)
        shell: pwsh
        run: |
          if (Test-Path "build/CMakeCache.txt") { Remove-Item "build/CMakeCache.txt" -Force }
          if (Test-Path "build/CMakeFiles") { Remove-Item "build/CMakeFiles" -Recurse -Force }
          cmake -B build -G "MinGW Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DOPENCHORDIX_BUILD_TESTS=ON `
            -DOPENCHORDIX_BUILD_APP=ON `
            -DOPENCHORDIX_BUILD_RENDERER=ON `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\external\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-mingw-dynamic `
            -DVCPKG_HOST_TRIPLET=x64-mingw-dynamic `
            -DVCPKG_INSTALLED_DIR="${{ github.workspace }}\build\vcpkg_installed"

      - name: Build (Windows Release)
        shell: pwsh
        run: cmake --build build -j2

      - name: Test (Windows)
        shell: pwsh
        run: |
          $env:PATH = "$env:GITHUB_WORKSPACE\build\vcpkg_installed\x64-mingw-dynamic\bin;${{ steps.mingw-path.outputs.mingw_bin }};$env:PATH"
          ctest --test-dir build --output-on-failure
